name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build + test (node ${{ matrix.node }} on ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['20', '22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Type-check (no emit)
        run: npx tsc -p packages/core/tsconfig.json --noEmit

      - name: Test
        run: npm test

      - name: npm audit (high severity)
        # Fail only on high/critical so a transient mid-severity advisory
        # doesn't take down CI on every machine in the matrix.
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: MCP smoke test
        shell: bash
        run: |
          printf '%s\n' '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0.0.1"}}}' \
            | node packages/core/bin/ai-optimizer.js > smoke.out &
          PID=$!
          sleep 2
          kill $PID 2>/dev/null || true
          test -s smoke.out
